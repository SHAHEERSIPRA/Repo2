name: Slack Notification

on:
  push:      
    branches:
      - main  
jobs:
  slack_notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack message
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }} 
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{
              \"text\": \"📌 New commit pushed to branch: ${{ github.ref_name }}\nRepository: ${{ github.repository }}\nAuthor: ${{ github.actor }}\nCommit: ${{ github.sha }}\nMessage: ${{ github.event.head_commit.message }}\nCommit Link: https://github.com/${{ github.repository }}/commit/${{ github.sha }}\"
            }" $SLACK_WEBHOOK